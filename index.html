<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Delivery QR Scanner — OneDrive Upload</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Roboto,Arial;margin:12px;color:#111;background:#fff}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
    button{flex:1 1 48%;padding:12px;border-radius:8px;border:none;background:#0078d4;color:#fff;font-size:15px}
    button.secondary{background:#6c757d}
    .wide{flex:1 1 100%}
    pre{background:#f6f6f6;padding:8px;border-radius:6px;max-height:260px;overflow:auto}
    #video{width:100%;max-width:640px;border-radius:8px;background:#000;display:none}
    input[type=file]{display:none}
    .hint{font-size:13px;color:#444;margin-top:6px}
    table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
    th,td{border:1px solid #e1e1e1;padding:6px;text-align:left}
    #folderName{font-weight:600;color:#333}
    #canvas{display:none}
    .small{font-size:13px;color:#666}
    #onedrivePanel{border:1px dashed #ddd;padding:8px;border-radius:8px;margin-top:8px}
    #folderList{max-height:200px;overflow:auto;border:1px solid #eee;padding:6px;border-radius:6px}
    .folderItem{padding:6px;border-bottom:1px solid #f1f1f1;cursor:pointer}
    .folderItem:hover{background:#f6f9ff}
  </style>

  <!-- MSAL (Microsoft Authentication Library) -->
  <script src="https://alcdn.msauth.net/browser/2.34.0/js/msal-browser.min.js"></script>
  <!-- jsQR for QR decoding -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <h2>Delivery QR Scanner — OneDrive Upload</h2>

  <div class="controls">
    <button id="uploadBtn" class="secondary">Upload Photo (QR)</button>
    <input id="fileInput" type="file" accept="image/*" capture="environment">
    <button id="openCamBtn">Open Camera</button>
    <button id="takePhotoBtn" class="secondary">Take Photo</button>
    <button id="closeCamBtn" class="secondary">Close Camera</button>
  </div>

  <div class="hint">Upload a photo or use the camera. If OneDrive integration is desired, click Connect OneDrive below and sign in.</div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <h3>Last Scan</h3>
  <pre id="last">No scans yet</pre>

  <h3>Stored Logs</h3>
  <div id="count"></div>
  <table id="logTable">
    <thead><tr><th>Time</th><th>Material</th><th>Truck</th><th>Net</th><th>Location</th></tr></thead>
    <tbody></tbody>
  </table>

  <div style="margin-top:10px" class="controls">
    <button id="saveToday" class="wide">Save Today CSV (download)</button>
  </div>

  <!-- OneDrive integration panel -->
  <div id="onedrivePanel">
    <div style="display:flex;gap:8px;align-items:center">
      <button id="connectOneDrive" class="secondary">Connect OneDrive</button>
      <div>Signed in: <span id="userName">not signed in</span></div>
    </div>

    <div style="margin-top:8px;display:flex;gap:8px">
      <button id="listRoot" class="secondary">List Root Folders</button>
      <button id="selectFolderBtn">Select Folder</button>
      <div>Selected folder: <span id="folderName">none</span></div>
    </div>

    <div id="folderList" style="margin-top:8px"></div>

    <div style="margin-top:8px" class="controls">
      <button id="uploadToOneDrive" class="wide">Upload Today's CSV to Selected OneDrive Folder</button>
    </div>
  </div>

<script>
/* =========================
   Configuration (edit)
   =========================
   - Register an app in Azure AD (App registrations).
   - Add platform: Single-page application (SPA) with redirect URI = your site URL.
   - Add Microsoft Graph delegated permission: Files.ReadWrite.All (or Files.ReadWrite).
   - Copy Application (client) ID below.
*/
const MSAL_CLIENT_ID = 'REPLACE_WITH_YOUR_CLIENT_ID'; // <-- set this
const MSAL_AUTHORITY = 'https://login.microsoftonline.com/common';
const MSAL_SCOPES = ['Files.ReadWrite.All','User.Read'];

/* =========================
   MSAL setup
   ========================= */
const msalConfig = {
  auth: { clientId: MSAL_CLIENT_ID, authority: MSAL_AUTHORITY, redirectUri: window.location.origin + window.location.pathname },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
let account = null;
let accessToken = null;
let selectedFolder = null; // { id, name, path }

/* =========================
   Storage & CSV helpers
   ========================= */
const STORAGE_KEY = 'deliveryLogs_v1';
const REQUIRED = ['materialType','truckId','driver','netWeight','taeWeight','materialWeight','location'];

function nowIso(){ return new Date().toISOString(); }
function loadLogs(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }catch(e){ return [] } }
function saveLogs(l){ localStorage.setItem(STORAGE_KEY, JSON.stringify(l)) }
function addLog(e){ const l = loadLogs(); l.push(e); saveLogs(l); render(); }
function logsToCsv(logs){
  const header = ['timestamp','materialType','truckId','driverName','driverPhone','netWeight','taeWeight','materialWeight','location','rawJson'];
  const rows = logs.map(l=>[
    l.timestamp, l.materialType, l.truckId, (l.driver&&l.driver.name)||'', (l.driver&&l.driver.phone)||'', l.netWeight, l.taeWeight, l.materialWeight, l.location, JSON.stringify(l.raw||{})
  ]);
  return [header.join(','), ...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
}
function downloadFile(name, content){
  const blob = new Blob([content], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function render(){
  const logs = loadLogs();
  document.getElementById('count').textContent = `Total logs: ${logs.length}`;
  const tbody = document.querySelector('#logTable tbody'); tbody.innerHTML = '';
  logs.slice().reverse().forEach(l=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="border:1px solid #e1e1e1;padding:6px">${l.timestamp}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.materialType}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.truckId}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.netWeight}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.location}</td>`;
    tbody.appendChild(tr);
  });
}

/* =========================
   OneDrive / Graph helpers
   ========================= */
async function signInOneDrive(){
  if(!MSAL_CLIENT_ID || MSAL_CLIENT_ID === 'REPLACE_WITH_YOUR_CLIENT_ID'){
    alert('Set MSAL_CLIENT_ID in the HTML to your Azure app client id before using OneDrive features.');
    return;
  }
  try{
    const loginResp = await msalInstance.loginPopup({ scopes: MSAL_SCOPES });
    account = loginResp.account;
    document.getElementById('userName').textContent = account.username || account.name || 'signed in';
    // acquire token
    const tokenResp = await msalInstance.acquireTokenSilent({ scopes: MSAL_SCOPES, account });
    accessToken = tokenResp.accessToken;
    console.log('acquired token silently');
  }catch(err){
    // fallback to interactive
    try{
      const tokenResp = await msalInstance.acquireTokenPopup({ scopes: MSAL_SCOPES });
      accessToken = tokenResp.accessToken;
      account = tokenResp.account;
      document.getElementById('userName').textContent = account.username || account.name || 'signed in';
    }catch(e){
      console.error('signin error', e);
      alert('Sign-in failed: ' + (e && e.message || e));
    }
  }
}

async function graphFetch(path, method='GET', body=null, headers={}){
  if(!accessToken) throw new Error('Not authenticated');
  const url = 'https://graph.microsoft.com/v1.0' + path;
  const opts = { method, headers: Object.assign({ Authorization: 'Bearer ' + accessToken }, headers) };
  if(body) opts.body = body;
  const res = await fetch(url, opts);
  if(!res.ok){
    const txt = await res.text();
    throw new Error('Graph error: ' + res.status + ' ' + txt);
  }
  return res.json ? res.json() : res;
}

async function listDriveRootChildren(){
  // list root children (folders and files)
  const data = await graphFetch('/me/drive/root/children?$top=200');
  return data.value || [];
}

async function listFolderChildren(folderId){
  const data = await graphFetch(`/me/drive/items/${folderId}/children?$top=200`);
  return data.value || [];
}

function renderFolderList(items){
  const container = document.getElementById('folderList');
  container.innerHTML = '';
  items.forEach(it=>{
    const div = document.createElement('div');
    div.className = 'folderItem';
    div.textContent = `${it.name} ${it.folder ? '(folder)' : ''}`;
    div.onclick = () => {
      if(it.folder){
        // set as selected folder
        selectedFolder = { id: it.id, name: it.name, path: it.parentReference ? it.parentReference.path : '' };
        document.getElementById('folderName').textContent = it.name;
        alert('Selected folder: ' + it.name);
      } else {
        alert('Not a folder. Tap a folder to select it.');
      }
    };
    container.appendChild(div);
  });
}

async function pickAndListRoot(){
  try{
    if(!accessToken) await signInOneDrive();
    const items = await listDriveRootChildren();
    renderFolderList(items);
    document.getElementById('last').textContent = 'Listed root items. Tap a folder to select it.';
  }catch(e){
    console.error(e);
    alert('Failed to list OneDrive root: ' + (e && e.message || e));
  }
}

async function uploadCsvToOneDriveFolder(filename, csvContent){
  if(!selectedFolder) throw new Error('No OneDrive folder selected');
  // Use simple upload for files < 4MB; for larger use upload session. We'll try simple first.
  const path = `/me/drive/items/${selectedFolder.id}:/${filename}:/content`;
  const res = await fetch('https://graph.microsoft.com/v1.0' + path, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'text/csv' },
    body: csvContent
  });
  if(!res.ok){
    const txt = await res.text();
    throw new Error('Upload failed: ' + res.status + ' ' + txt);
  }
  return res.json();
}

/* =========================
   QR decode helpers (jsQR)
   ========================= */
function imageFileToImageElement(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed'));
    img.src = URL.createObjectURL(file);
  });
}

function applyContrastAndBrightness(imageData, contrast = 1.2, brightness = 10){
  const d = imageData.data;
  const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
  for(let i=0;i<d.length;i+=4){
    d[i] = clamp(factor * (d[i] - 128) + 128 + brightness);
    d[i+1] = clamp(factor * (d[i+1] - 128) + 128 + brightness);
    d[i+2] = clamp(factor * (d[i+2] - 128) + 128 + brightness);
  }
  return imageData;
}
function clamp(v){ return Math.max(0, Math.min(255, Math.round(v))); }

function rotateCanvas(sourceCanvas, angleDeg){
  const angle = angleDeg * Math.PI / 180;
  const w = sourceCanvas.width, h = sourceCanvas.height;
  const dest = document.createElement('canvas');
  if(angleDeg % 180 === 0){ dest.width = w; dest.height = h; }
  else { dest.width = h; dest.height = w; }
  const ctx = dest.getContext('2d');
  ctx.translate(dest.width/2, dest.height/2);
  ctx.rotate(angle);
  ctx.drawImage(sourceCanvas, -w/2, -h/2);
  return dest;
}

function centerCropCanvas(sourceCanvas, cropRatio = 0.6){
  const w = sourceCanvas.width, h = sourceCanvas.height;
  const cw = Math.round(w * cropRatio), ch = Math.round(h * cropRatio);
  const sx = Math.round((w - cw)/2), sy = Math.round((h - ch)/2);
  const dest = document.createElement('canvas');
  dest.width = cw; dest.height = ch;
  const ctx = dest.getContext('2d');
  ctx.drawImage(sourceCanvas, sx, sy, cw, ch, 0, 0, cw, ch);
  return dest;
}

async function tryDecodeFromCanvas(canvas){
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
  if(code) return code.data;
  const boosted = applyContrastAndBrightness(imageData, 1.4, 12);
  ctx.putImageData(boosted, 0, 0);
  const imageData2 = ctx.getImageData(0,0,canvas.width,canvas.height);
  code = jsQR(imageData2.data, imageData2.width, imageData2.height, { inversionAttempts: 'attemptBoth' });
  if(code) return code.data;
  return null;
}

async function decodeWithMultipleStrategies(file){
  const img = await imageFileToImageElement(file);
  const maxDim = 2000;
  let w = img.naturalWidth, h = img.naturalHeight;
  if(Math.max(w,h) > maxDim){
    const scale = maxDim / Math.max(w,h);
    w = Math.round(w * scale); h = Math.round(h * scale);
  }
  const base = document.createElement('canvas');
  base.width = w; base.height = h;
  const bctx = base.getContext('2d');
  bctx.drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(img.src);

  const attempts = [];
  attempts.push(base);
  attempts.push(centerCropCanvas(base, 0.6));

  const quadSize = Math.round(Math.min(w,h) * 0.6);
  const quads = [
    {sx:0, sy:0}, {sx:w-quadSize, sy:0}, {sx:0, sy:h-quadSize}, {sx:w-quadSize, sy:h-quadSize}
  ];
  quads.forEach(q=>{
    const c = document.createElement('canvas'); c.width = quadSize; c.height = quadSize;
    const ctx = c.getContext('2d');
    ctx.drawImage(base, q.sx, q.sy, quadSize, quadSize, 0, 0, quadSize, quadSize);
    attempts.push(c);
  });

  [90,180,270].forEach(angle => attempts.push(rotateCanvas(base, angle)));

  const scales = [0.6, 0.8, 1.2];
  scales.forEach(s => {
    const c = document.createElement('canvas');
    c.width = Math.max(200, Math.round(w * s));
    c.height = Math.max(200, Math.round(h * s));
    const ctx = c.getContext('2d');
    ctx.drawImage(base, 0, 0, w, h, 0, 0, c.width, c.height);
    attempts.push(c);
  });

  for(let i=0;i<attempts.length;i++){
    const c = attempts[i];
    document.getElementById('last').textContent = `Decoding attempt ${i+1}/${attempts.length} (size ${c.width}x${c.height})...`;
    try{
      const res = await tryDecodeFromCanvas(c);
      if(res) return res;
    }catch(e){
      console.warn('attempt decode error', e);
    }
  }
  throw new Error('No QR code found after multiple attempts');
}

/* =========================
   Upload & camera flows
   ========================= */
const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', ()=> fileInput.click());

fileInput.addEventListener('change', async (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  document.getElementById('last').textContent = 'Starting robust decode of uploaded image...';
  try{
    const decoded = await decodeWithMultipleStrategies(f);
    handleDecodedText(decoded);
  }catch(err){
    document.getElementById('last').textContent = 'Upload decode failed: ' + (err && err.message || err);
    console.error('decode error', err);
  } finally {
    ev.target.value = '';
  }
});

let stream = null;
const video = document.getElementById('video');

document.getElementById('openCamBtn').addEventListener('click', openCamera);
document.getElementById('takePhotoBtn').addEventListener('click', takePhoto);
document.getElementById('closeCamBtn').addEventListener('click', closeCamera);

async function openCamera(){
  document.getElementById('last').textContent = 'Opening camera...';
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('last').textContent = 'Camera open. Tap Take Photo to capture.';
  }catch(e){
    document.getElementById('last').textContent = 'Camera open failed: ' + (e && e.message || e);
    console.error(e);
  }
}

async function takePhoto(){
  if(!stream){ document.getElementById('last').textContent = 'Camera not open'; return; }
  try{
    const w = video.videoWidth || 1280;
    const h = video.videoHeight || 720;
    const canvas = document.getElementById('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.95));
    document.getElementById('last').textContent = 'Captured image — starting robust decode...';
    const decoded = await decodeWithMultipleStrategies(blob);
    handleDecodedText(decoded);
  }catch(e){
    document.getElementById('last').textContent = 'Capture decode failed: ' + (e && e.message || e);
    console.error(e);
  }
}

function closeCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('last').textContent = 'Camera closed';
}

/* =========================
   Decoded payload handling
   ========================= */
function handleDecodedText(decoded){
  try{
    const payload = JSON.parse(decoded);
    for(const k of REQUIRED) if(!(k in payload)) throw new Error('Missing '+k);
    const entry = {
      timestamp: nowIso(),
      materialType: payload.materialType,
      truckId: payload.truckId,
      driver: payload.driver || {},
      netWeight: payload.netWeight,
      taeWeight: payload.taeWeight,
      materialWeight: payload.materialWeight,
      location: payload.location,
      raw: payload
    };
    addLog(entry);
    document.getElementById('last').textContent = JSON.stringify(entry, null, 2);
    if(navigator.vibrate) navigator.vibrate(120);
  }catch(e){
    document.getElementById('last').textContent = 'Decoded but invalid JSON or missing keys: ' + (e && e.message || e);
  }
}

/* =========================
   Save / export + OneDrive upload wiring
   ========================= */
document.getElementById('saveToday').addEventListener('click', ()=>{
  const logs = loadLogs();
  const today = new Date().toISOString().slice(0,10);
  const todays = logs.filter(l=>l.timestamp.startsWith(today));
  if(!todays.length){ alert('No logs for today'); return; }
  const csv = logsToCsv(todays);
  const filename = `delivery-log-${today}.csv`;
  downloadFile(filename, csv);
});

document.getElementById('connectOneDrive').addEventListener('click', async ()=>{
  await signInOneDrive();
});

document.getElementById('listRoot').addEventListener('click', async ()=>{
  await pickAndListRoot();
});

document.getElementById('selectFolderBtn').addEventListener('click', async ()=>{
  // list root and let user click a folder in the folderList; this button just prompts listing
  await pickAndListRoot();
});

document.getElementById('uploadToOneDrive').addEventListener('click', async ()=>{
  try{
    if(!accessToken) await signInOneDrive();
    if(!selectedFolder){ alert('Select a OneDrive folder first (tap a folder in the list)'); return; }
    const logs = loadLogs();
    if(!logs.length){ alert('No logs to upload'); return; }
    const csv = logsToCsv(logs);
    const filename = `delivery-log-${new Date().toISOString().slice(0,10)}.csv`;
    document.getElementById('last').textContent = 'Uploading to OneDrive...';
    const res = await uploadCsvToOneDriveFolder(filename, csv);
    document.getElementById('last').textContent = 'Upload complete: ' + (res && res.name || filename);
    alert('Uploaded to OneDrive: ' + (res && res.name || filename));
  }catch(e){
    console.error(e);
    alert('OneDrive upload failed: ' + (e && e.message || e));
  }
});

/* =========================
   Init
   ========================= */
render();
(async function init(){
  // try to restore account silently
  try{
    const accounts = msalInstance.getAllAccounts();
    if(accounts && accounts.length) {
      account = accounts[0];
      document.getElementById('userName').textContent = account.username || account.name || 'signed in';
      try{
        const tokenResp = await msalInstance.acquireTokenSilent({ scopes: MSAL_SCOPES, account });
        accessToken = tokenResp.accessToken;
      }catch(e){ console.log('silent token failed', e); }
    }
  }catch(e){ console.warn(e); }
})();
</script>
</body>
</html>
