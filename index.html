<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>QR Upload + Camera Capture Scanner</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Roboto,Arial;margin:12px;color:#111;background:#fff}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
    button{flex:1 1 48%;padding:12px;border-radius:8px;border:none;background:#0078d4;color:#fff;font-size:15px}
    button.secondary{background:#6c757d}
    .wide{flex:1 1 100%}
    pre{background:#f6f6f6;padding:8px;border-radius:6px;max-height:220px;overflow:auto}
    #video{width:100%;max-width:640px;border-radius:8px;background:#000}
    input[type=file]{display:none}
    .hint{font-size:13px;color:#444;margin-top:6px}
  </style>

  <!-- html5-qrcode CDN -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
</head>
<body>
  <h2>QR Upload + Camera Capture Scanner</h2>

  <div class="controls">
    <button id="uploadBtn" class="secondary">Upload Photo (QR)</button>
    <input id="fileInput" type="file" accept="image/*" capture="environment">
    <button id="openCamBtn">Open Camera</button>
    <button id="takePhotoBtn" class="secondary">Take Photo</button>
    <button id="closeCamBtn" class="secondary">Close Camera</button>
  </div>

  <div class="hint">Upload a photo or use the camera. Captured images are decoded the same way as uploads.</div>

  <video id="video" autoplay playsinline style="display:none"></video>
  <canvas id="captureCanvas" style="display:none"></canvas>

  <h3>Last Scan</h3>
  <pre id="last">No scans yet</pre>

  <h3>Stored Logs</h3>
  <div id="count"></div>
  <table id="logTable" style="width:100%;border-collapse:collapse;margin-top:8px;font-size:13px">
    <thead><tr><th style="border:1px solid #e1e1e1;padding:6px">Time</th><th style="border:1px solid #e1e1e1;padding:6px">Material</th><th style="border:1px solid #e1e1e1;padding:6px">Truck</th><th style="border:1px solid #e1e1e1;padding:6px">Net</th><th style="border:1px solid #e1e1e1;padding:6px">Location</th></tr></thead>
    <tbody></tbody>
  </table>

  <div style="margin-top:10px" class="controls">
    <button id="saveToday" class="wide">Save Today CSV (download)</button>
  </div>

<script>
/* ====== Simple storage & CSV ====== */
const STORAGE_KEY = 'deliveryLogs_v1';
const REQUIRED = ['materialType','truckId','driver','netWeight','taeWeight','materialWeight','location'];

function nowIso(){ return new Date().toISOString(); }
function loadLogs(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }catch(e){ return [] } }
function saveLogs(l){ localStorage.setItem(STORAGE_KEY, JSON.stringify(l)) }
function addLog(e){ const l = loadLogs(); l.push(e); saveLogs(l); render(); }
function logsToCsv(logs){
  const header = ['timestamp','materialType','truckId','driverName','driverPhone','netWeight','taeWeight','materialWeight','location','rawJson'];
  const rows = logs.map(l=>[
    l.timestamp, l.materialType, l.truckId, (l.driver&&l.driver.name)||'', (l.driver&&l.driver.phone)||'', l.netWeight, l.taeWeight, l.materialWeight, l.location, JSON.stringify(l.raw||{})
  ]);
  return [header.join(','), ...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
}
function downloadFile(name, content){
  const blob = new Blob([content], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function render(){
  const logs = loadLogs();
  document.getElementById('count').textContent = `Total logs: ${logs.length}`;
  const tbody = document.querySelector('#logTable tbody'); tbody.innerHTML = '';
  logs.slice().reverse().forEach(l=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td style="border:1px solid #e1e1e1;padding:6px">${l.timestamp}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.materialType}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.truckId}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.netWeight}</td><td style="border:1px solid #e1e1e1;padding:6px">${l.location}</td>`;
    tbody.appendChild(tr);
  });
}

/* ====== Decoder helper (uses html5-qrcode) ====== */
async function decodeBlob(blob){
  if(!window.Html5Qrcode) throw new Error('Decoder library not loaded');
  // Html5Qrcode.scanFileV2 accepts File/Blob
  const file = new File([blob], 'capture.jpg', { type: blob.type || 'image/jpeg' });
  const result = await Html5Qrcode.scanFileV2(file, { returnDetailedScanResult: false });
  return result.decodedText || result;
}

function handleDecodedText(decoded){
  try{
    const payload = JSON.parse(decoded);
    for(const k of REQUIRED) if(!(k in payload)) throw new Error('Missing '+k);
    const entry = {
      timestamp: nowIso(),
      materialType: payload.materialType,
      truckId: payload.truckId,
      driver: payload.driver || {},
      netWeight: payload.netWeight,
      taeWeight: payload.taeWeight,
      materialWeight: payload.materialWeight,
      location: payload.location,
      raw: payload
    };
    addLog(entry);
    document.getElementById('last').textContent = JSON.stringify(entry, null, 2);
    if(navigator.vibrate) navigator.vibrate(120);
  }catch(e){
    document.getElementById('last').textContent = 'Decoded but invalid JSON or missing keys: ' + (e && e.message || e);
  }
}

/* ====== Upload flow (fixed) ====== */
const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', ()=> fileInput.click());

fileInput.addEventListener('change', async (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  document.getElementById('last').textContent = 'Decoding uploaded image...';
  try{
    const decoded = await decodeBlob(f);
    handleDecodedText(decoded);
  }catch(err){
    document.getElementById('last').textContent = 'Upload decode failed: ' + (err && err.message || err);
    console.error(err);
  } finally { ev.target.value = ''; }
});

/* ====== Camera capture flow ====== */
let stream = null;
const video = document.getElementById('video');
const canvas = document.getElementById('captureCanvas');

async function openCamera(){
  document.getElementById('last').textContent = 'Opening camera...';
  try{
    // prefer rear camera
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('last').textContent = 'Camera open. Tap Take Photo to capture.';
  }catch(e){
    document.getElementById('last').textContent = 'Camera open failed: ' + (e && e.message || e);
    console.error(e);
  }
}

async function takePhoto(){
  if(!stream){ document.getElementById('last').textContent = 'Camera not open'; return; }
  try{
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 480;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    // convert to blob
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
    document.getElementById('last').textContent = 'Captured image — decoding...';
    const decoded = await decodeBlob(blob);
    handleDecodedText(decoded);
  }catch(e){
    document.getElementById('last').textContent = 'Capture decode failed: ' + (e && e.message || e);
    console.error(e);
  }
}

function closeCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('last').textContent = 'Camera closed';
}

/* ====== Save today CSV ====== */
document.getElementById('saveToday').addEventListener('click', ()=>{
  const logs = loadLogs();
  const today = new Date().toISOString().slice(0,10);
  const todays = logs.filter(l=>l.timestamp.startsWith(today));
  if(!todays.length){ alert('No logs for today'); return; }
  const csv = logsToCsv(todays);
  const filename = `delivery-log-${today}.csv`;
  downloadFile(filename, csv);
});

/* ====== Buttons wiring ====== */
document.getElementById('openCamBtn').addEventListener('click', openCamera);
document.getElementById('takePhotoBtn').addEventListener('click', takePhoto);
document.getElementById('closeCamBtn').addEventListener('click', closeCamera);

/* ====== Init ====== */
render();
</script>
</body>
</html>
