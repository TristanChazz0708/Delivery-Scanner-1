<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Delivery QR Scanner — Simple</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --primary:#0b74de;
      --accent:#0a66c2;
      --muted:#6b7280;
      --success:#16a34a;
      --danger:#dc2626;
      --radius:10px;
      --pad:12px;
      font-family:Inter,system-ui,Roboto,Arial;
    }
    body{margin:12px;background:var(--bg);color:#0f172a}
    .wrap{max-width:920px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h1{font-size:18px;margin:0}
    .card{background:var(--card);border-radius:var(--radius);padding:var(--pad);box-shadow:0 6px 18px rgba(11,20,40,0.06);margin-bottom:12px}
    .controls{display:flex;flex-wrap:wrap;gap:8px}
    button{background:var(--primary);color:#fff;border:0;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px}
    button.ghost{background:transparent;border:1px solid #e6eefc;color:var(--muted)}
    button.secondary{background:#fff;color:var(--primary);border:1px solid #dbeafe}
    .wide{flex:1 1 100%}
    .muted{color:var(--muted);font-size:13px}
    #video{width:100%;max-height:360px;border-radius:8px;background:#000;display:none}
    pre{background:#f8fafc;padding:10px;border-radius:8px;overflow:auto;max-height:220px}
    table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
    th,td{border:1px solid #eef2ff;padding:8px;text-align:left}
    .status{font-size:13px;color:#334155;margin-top:8px}
    .toast{position:fixed;right:16px;bottom:16px;background:#111;color:#fff;padding:10px 14px;border-radius:8px;display:none}
    input[type=file]{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Delivery QR Scanner</h1>
      <div class="muted">Upload • Camera • Share / Save</div>
    </header>

    <section class="card">
      <div class="controls">
        <button id="uploadBtn" class="secondary">Upload Photo</button>
        <input id="fileInput" type="file" accept="image/*" capture="environment">
        <button id="openCamBtn">Open Camera</button>
        <button id="captureBtn" class="secondary">Capture</button>
        <button id="closeCamBtn" class="ghost">Close Camera</button>
      </div>
      <div class="muted" style="margin-top:8px">Tip: For best results on lower‑MP cameras, move closer so the QR fills most of the frame.</div>
      <video id="video" autoplay playsinline></video>
    </section>

    <section class="card">
      <h3 style="margin:0 0 8px 0">Last Scan</h3>
      <pre id="last">No scans yet</pre>
    </section>

    <section class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Stored Logs</h3>
        <div class="muted" id="count">Total logs: 0</div>
      </div>
      <table id="logTable" aria-live="polite">
        <thead><tr><th>Time</th><th>Material</th><th>Truck</th><th>Net</th><th>Location</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h3 style="margin:0 0 8px 0">Save & Share</h3>

      <div class="controls" style="align-items:center;margin-bottom:8px">
        <button id="chooseFolderBtn" class="secondary">Choose Save Folder</button>
        <button id="clearFolderBtn" class="ghost">Clear Folder</button>
        <div class="muted" style="flex:1">Selected: <span id="folderName">none</span></div>
      </div>

      <div class="controls" style="margin-bottom:8px">
        <button id="saveToFolderBtn" class="wide">Save All Logs To Chosen Folder</button>
      </div>

      <div class="controls" style="margin-bottom:8px">
        <button id="shareTodayBtn" class="wide">Share Today's CSV (OS share sheet)</button>
      </div>

      <div class="controls">
        <button id="downloadTodayBtn" class="wide secondary">Download Today's CSV</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* -------------------------
   Minimal, readable JS
   - single place for state
   - clear helper names
   - Web Share -> Directory -> Download fallback
   -------------------------*/

const state = {
  chosenDirHandle: null
};

/* ---------- UI helpers ---------- */
function toast(msg, ms = 3000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timeout);
  t._timeout = setTimeout(()=> t.style.display = 'none', ms);
}

/* ---------- Storage & CSV ---------- */
const STORAGE_KEY = 'deliveryLogs_v1';
const REQUIRED = ['materialType','truckId','driver','netWeight','taeWeight','materialWeight','location'];

function nowIso(){ return new Date().toISOString(); }
function loadLogs(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }catch(e){ return [] } }
function saveLogs(l){ localStorage.setItem(STORAGE_KEY, JSON.stringify(l)) }
function addLog(entry){ const logs = loadLogs(); logs.push(entry); saveLogs(logs); renderLogs(); }

function logsToCsv(logs){
  const header = ['timestamp','materialType','truckId','driverName','driverPhone','netWeight','taeWeight','materialWeight','location','rawJson'];
  const rows = logs.map(l=>[
    l.timestamp, l.materialType, l.truckId, (l.driver&&l.driver.name)||'', (l.driver&&l.driver.phone)||'', l.netWeight, l.taeWeight, l.materialWeight, l.location, JSON.stringify(l.raw||{})
  ]);
  return [header.join(','), ...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
}
function downloadFile(name, content){
  const blob = new Blob([content], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

function renderLogs(){
  const logs = loadLogs();
  document.getElementById('count').textContent = `Total logs: ${logs.length}`;
  const tbody = document.querySelector('#logTable tbody'); tbody.innerHTML = '';
  logs.slice().reverse().forEach(l=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${l.timestamp}</td><td>${l.materialType}</td><td>${l.truckId}</td><td>${l.netWeight}</td><td>${l.location}</td>`;
    tbody.appendChild(tr);
  });
}

/* ---------- Persist chosen folder (IndexedDB simple) ---------- */
const DB_NAME = 'scanner-handles-v1', STORE = 'handles', KEY = 'chosenDir';
function openDb(){ return new Promise((res, rej)=>{ const r = indexedDB.open(DB_NAME,1); r.onupgradeneeded = ()=> r.result.createObjectStore(STORE); r.onsuccess = ()=> res(r.result); r.onerror = ()=> rej(r.error); }); }
async function idbPut(key, value){ const db = await openDb(); return new Promise((res, rej)=>{ const tx = db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(value, key).onsuccess = ()=>{ db.close(); res(true); }; tx.onerror = ()=>{ db.close(); rej(tx.error); }; }); }
async function idbGet(key){ const db = await openDb(); return new Promise((res, rej)=>{ const tx = db.transaction(STORE,'readonly'); tx.objectStore(STORE).get(key).onsuccess = e=>{ db.close(); res(e.target.result); }; tx.onerror = ()=>{ db.close(); rej(tx.error); }; }); }
async function idbDelete(key){ const db = await openDb(); return new Promise((res, rej)=>{ const tx = db.transaction(STORE,'readwrite'); tx.objectStore(STORE).delete(key).onsuccess = ()=>{ db.close(); res(true); }; tx.onerror = ()=>{ db.close(); rej(tx.error); }; }); }

/* ---------- Directory picker helpers ---------- */
async function chooseFolder(){
  if(!('showDirectoryPicker' in window)){ toast('Folder picker not supported in this browser'); return; }
  try{
    const dir = await window.showDirectoryPicker({ startIn: 'documents' });
    try{ await dir.requestPermission({ mode: 'readwrite' }); }catch(e){}
    state.chosenDirHandle = dir;
    await idbPut(KEY, dir);
    document.getElementById('folderName').textContent = dir.name || 'selected';
    toast('Folder selected');
  }catch(e){
    if(e && e.name === 'AbortError'){ toast('Folder selection cancelled'); return; }
    console.error(e); toast('Failed to choose folder');
  }
}
async function restoreFolder(){
  if(!('showDirectoryPicker' in window)) return;
  try{
    const stored = await idbGet(KEY);
    if(!stored) return;
    state.chosenDirHandle = stored;
    const perm = await state.chosenDirHandle.queryPermission({ mode: 'readwrite' });
    if(perm === 'prompt'){ const r = await state.chosenDirHandle.requestPermission({ mode: 'readwrite' }); if(r !== 'granted'){ await idbDelete(KEY); state.chosenDirHandle = null; return; } }
    if(perm !== 'granted' && perm !== 'prompt'){ state.chosenDirHandle = null; return; }
    document.getElementById('folderName').textContent = state.chosenDirHandle.name || 'selected';
  }catch(e){ console.warn(e); }
}
async function clearFolder(){
  try{ await idbDelete(KEY); }catch(e){}
  state.chosenDirHandle = null;
  document.getElementById('folderName').textContent = 'none';
  toast('Cleared chosen folder');
}
async function saveCsvToChosenFolder(filename, csv){
  if(!state.chosenDirHandle) throw new Error('No folder chosen');
  const fh = await state.chosenDirHandle.getFileHandle(filename, { create: true });
  const w = await fh.createWritable();
  await w.write(csv);
  await w.close();
}

/* ---------- Web Share logic (file handoff) ---------- */
async function shareFileOS(file, title='', text=''){
  if(navigator.canShare && navigator.canShare({ files: [file] })){
    try{ await navigator.share({ files: [file], title, text }); return { ok:true }; }
    catch(e){ if(e.name === 'AbortError') return { ok:false, cancelled:true }; return { ok:false, error:e }; }
  }
  return { ok:false, unsupported:true };
}

/* ---------- jsQR loader + decode attempts ---------- */
async function ensureJsQr(){
  if(window.jsQR) return;
  try{
    await new Promise((res, rej)=>{
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
      s.async = true; s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
  }catch(e){ console.warn('jsQR load failed', e); }
  if(!window.jsQR) throw new Error('Decoder not available');
}

function imageToCanvas(img, maxDim=2000){
  let w = img.naturalWidth, h = img.naturalHeight;
  if(Math.max(w,h) > maxDim){ const scale = maxDim / Math.max(w,h); w = Math.round(w*scale); h = Math.round(h*scale); }
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  c.getContext('2d').drawImage(img,0,0,w,h);
  return c;
}
function enhanceImageData(imageData, contrast=1.4, brightness=12){
  const d = imageData.data; const factor = (259*(contrast+255))/(255*(259-contrast));
  for(let i=0;i<d.length;i+=4){
    d[i] = clamp(factor*(d[i]-128)+128+brightness);
    d[i+1] = clamp(factor*(d[i+1]-128)+128+brightness);
    d[i+2] = clamp(factor*(d[i+2]-128)+128+brightness);
  }
  return imageData;
}
function clamp(v){ return Math.max(0, Math.min(255, Math.round(v))); }

async function tryDecodeCanvas(canvas){
  await ensureJsQr();
  const ctx = canvas.getContext('2d');
  let data = ctx.getImageData(0,0,canvas.width,canvas.height);
  let code = jsQR(data.data, data.width, data.height, { inversionAttempts: 'attemptBoth' });
  if(code) return code.data;
  ctx.putImageData(enhanceImageData(data), 0, 0);
  data = ctx.getImageData(0,0,canvas.width,canvas.height);
  code = jsQR(data.data, data.width, data.height, { inversionAttempts: 'attemptBoth' });
  if(code) return code.data;
  return null;
}

async function decodeFileRobust(file){
  const img = await new Promise((res, rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej('image load'); i.src = URL.createObjectURL(file); });
  const base = imageToCanvas(img, 2000);
  URL.revokeObjectURL(img.src);
  const attempts = [base, centerCrop(base,0.6)];
  const quad = Math.round(Math.min(base.width, base.height)*0.6);
  const quads = [{x:0,y:0},{x:base.width-quad,y:0},{x:0,y:base.height-quad},{x:base.width-quad,y:base.height-quad}];
  quads.forEach(q=>{ const c=document.createElement('canvas'); c.width=c.height=quad; c.getContext('2d').drawImage(base,q.x,q.y,quad,quad,0,0,quad,quad); attempts.push(c); });
  [90,180,270].forEach(a=>attempts.push(rotateCanvas(base,a)));
  [0.6,0.8,1.2].forEach(s=>{ const c=document.createElement('canvas'); c.width=Math.max(200,Math.round(base.width*s)); c.height=Math.max(200,Math.round(base.height*s)); c.getContext('2d').drawImage(base,0,0,base.width,base.height,0,0,c.width,c.height); attempts.push(c); });
  for(let i=0;i<attempts.length;i++){
    document.getElementById('last').textContent = `Decoding attempt ${i+1}/${attempts.length} (${attempts[i].width}x${attempts[i].height})...`;
    try{ const res = await tryDecodeCanvas(attempts[i]); if(res) return res; }catch(e){ console.warn(e); }
  }
  throw new Error('No QR found');
}
function centerCrop(canvas, ratio=0.6){ const w=canvas.width,h=canvas.height,cw=Math.round(w*ratio),ch=Math.round(h*ratio),sx=Math.round((w-cw)/2),sy=Math.round((h-ch)/2); const c=document.createElement('canvas'); c.width=cw;c.height=ch; c.getContext('2d').drawImage(canvas,sx,sy,cw,ch,0,0,cw,ch); return c; }
function rotateCanvas(src, deg){ const angle=deg*Math.PI/180; const w=src.width,h=src.height; const dest=document.createElement('canvas'); dest.width = (deg%180===0)?w:h; dest.height = (deg%180===0)?h:w; const ctx=dest.getContext('2d'); ctx.translate(dest.width/2,dest.height/2); ctx.rotate(angle); ctx.drawImage(src,-w/2,-h/2); return dest; }

/* ---------- Upload & camera flows ---------- */
const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', async e=>{
  const f = e.target.files && e.target.files[0]; if(!f) return;
  document.getElementById('last').textContent = 'Decoding uploaded image...';
  try{ const decoded = await decodeFileRobust(f); handleDecoded(decoded); toast('QR decoded'); } catch(err){ document.getElementById('last').textContent = 'Decode failed: '+(err.message||err); toast('Decode failed'); }
  e.target.value = '';
});

let stream = null; const video = document.getElementById('video');
document.getElementById('openCamBtn').addEventListener('click', async ()=>{
  try{ stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: 'environment' }, audio:false }); video.srcObject = stream; video.style.display = 'block'; toast('Camera opened'); document.getElementById('last').textContent = 'Camera open'; }catch(e){ console.error(e); toast('Camera failed'); }
});
document.getElementById('captureBtn').addEventListener('click', async ()=>{
  if(!stream){ toast('Open camera first'); return; }
  const w = video.videoWidth || 1280, h = video.videoHeight || 720;
  const c = document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(video,0,0,w,h);
  const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',0.95));
  document.getElementById('last').textContent = 'Captured — decoding...';
  try{ const decoded = await decodeFileRobust(blob); handleDecoded(decoded); toast('Captured & decoded'); }catch(e){ document.getElementById('last').textContent = 'Decode failed: '+(e.message||e); toast('Decode failed'); }
});
document.getElementById('closeCamBtn').addEventListener('click', ()=>{ if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; } video.srcObject=null; video.style.display='none'; toast('Camera closed'); });

/* ---------- Handle decoded JSON ---------- */
function handleDecoded(text){
  try{
    const payload = JSON.parse(text);
    for(const k of REQUIRED) if(!(k in payload)) throw new Error('Missing '+k);
    const entry = {
      timestamp: nowIso(),
      materialType: payload.materialType,
      truckId: payload.truckId,
      driver: payload.driver||{},
      netWeight: payload.netWeight,
      taeWeight: payload.taeWeight,
      materialWeight: payload.materialWeight,
      location: payload.location,
      raw: payload
    };
    addLog(entry);
    document.getElementById('last').textContent = JSON.stringify(entry, null, 2);
  }catch(e){
    document.getElementById('last').textContent = 'Invalid QR payload: ' + (e.message||e);
    toast('Invalid QR payload');
  }
}

/* ---------- Save / Share wiring ---------- */
document.getElementById('downloadTodayBtn').addEventListener('click', ()=>{
  const logs = loadLogs(); const today = new Date().toISOString().slice(0,10); const todays = logs.filter(l=>l.timestamp.startsWith(today));
  if(!todays.length){ toast('No logs for today'); return; }
  const csv = logsToCsv(todays); const filename = `delivery-log-${today}.csv`; downloadFile(filename,csv); toast('Downloaded CSV');
});

document.getElementById('chooseFolderBtn').addEventListener('click', chooseFolder);
document.getElementById('clearFolderBtn').addEventListener('click', clearFolder);

document.getElementById('saveToFolderBtn').addEventListener('click', async ()=>{
  const logs = loadLogs(); if(!logs.length){ toast('No logs to save'); return; }
  const csv = logsToCsv(logs); const filename = `delivery-log-${new Date().toISOString().slice(0,10)}.csv`;
  if(!state.chosenDirHandle){ toast('No chosen folder — choose one first'); return; }
  try{ await saveCsvToChosenFolder(filename,csv); toast('Saved to chosen folder'); }catch(e){ console.error(e); toast('Save failed'); }
});

document.getElementById('shareTodayBtn').addEventListener('click', async ()=>{
  const logs = loadLogs(); const today = new Date().toISOString().slice(0,10); const todays = logs.filter(l=>l.timestamp.startsWith(today));
  if(!todays.length){ toast('No logs for today'); return; }
  const csv = logsToCsv(todays); const filename = `delivery-log-${today}.csv`; const file = new File([csv], filename, { type: 'text/csv' });
  const res = await shareFileOS(file, 'Delivery CSV', `Delivery CSV for ${today}`);
  if(res.ok){ toast('Shared to OS share sheet'); return; }
  if(res.cancelled){ toast('Share cancelled'); return; }
  // fallback to chosen folder
  if(state.chosenDirHandle){
    try{ await saveCsvToChosenFolder(filename,csv); toast('Saved to chosen folder'); return; }catch(e){ console.warn(e); }
  }
  // final fallback: download
  downloadFile(filename,csv); toast('Downloaded CSV');
});

/* ---------- Init ---------- */
(async function init(){
  try{ await restoreFolder(); }catch(e){ console.warn(e); }
  renderLogs();
})();
</script>
</body>
</html>
