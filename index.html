<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Delivery QR Scanner (Android)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:12px;color:#111}
    h1{font-size:18px;margin:6px 0}
    #reader{width:100%;max-width:640px;height:auto;margin:8px auto;border-radius:8px;overflow:hidden}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
    button{flex:1 1 48%;padding:12px;border-radius:8px;border:none;background:#0078d4;color:#fff;font-size:16px}
    button.secondary{background:#6c757d}
    pre{background:#f6f6f6;padding:8px;border-radius:6px;max-height:180px;overflow:auto}
    table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
    th,td{border:1px solid #e1e1e1;padding:6px;text-align:left}
    .big{font-size:15px;padding:14px}
    #status{margin-top:6px;font-weight:600}
    input[type=file]{display:none}
  </style>
</head>
<body>
  <h1>Delivery QR Scanner</h1>
  <div id="reader"></div>

  <div class="controls">
    <button id="requestBtn" class="big">Request Camera Permission</button>
    <button id="startBtn" class="big">Start Camera</button>
    <button id="stopBtn" class="big secondary">Stop Camera</button>
    <label for="fileInput" style="flex:1 1 48%"><button class="big secondary" style="width:100%">Upload Photo</button></label>
    <input id="fileInput" type="file" accept="image/*" capture="environment">
  </div>

  <div id="status">Status: <span id="online">—</span></div>

  <h2>Last Scan</h2>
  <pre id="last">No scans yet</pre>

  <h2>Stored Logs</h2>
  <div id="count"></div>
  <table id="logTable"><thead><tr><th>Time</th><th>Material</th><th>Truck</th><th>Driver</th><th>Net</th><th>Location</th></tr></thead><tbody></tbody></table>

  <div style="margin-top:10px" class="controls">
    <button id="saveToday" class="big">Save Today CSV</button>
    <button id="exportAll" class="big secondary">Download All CSV</button>
  </div>

<script>
/* Minimal offline scanner for Android */
const STORAGE_KEY = 'deliveryLogs_v1';
const REQUIRED = ['materialType','truckId','driver','netWeight','taeWeight','materialWeight','location'];

function nowIso(){ return new Date().toISOString(); }
function loadLogs(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }catch(e){return[]} }
function saveLogs(l){ localStorage.setItem(STORAGE_KEY, JSON.stringify(l)) }
function addLog(e){ const l=loadLogs(); l.push(e); saveLogs(l); render(); }

function logsToCsv(logs){
  const header = ['timestamp','materialType','truckId','driverName','driverPhone','netWeight','taeWeight','materialWeight','location','rawJson'];
  const rows = logs.map(l=>[
    l.timestamp, l.materialType, l.truckId, (l.driver&&l.driver.name)||'', (l.driver&&l.driver.phone)||'', l.netWeight, l.taeWeight, l.materialWeight, l.location, JSON.stringify(l.raw||{})
  ]);
  return [header.join(','), ...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
}

function downloadFile(name, content){
  const blob = new Blob([content], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

function render(){
  const logs = loadLogs();
  document.getElementById('count').textContent = `Total logs: ${logs.length}`;
  const tbody = document.querySelector('#logTable tbody'); tbody.innerHTML = '';
  logs.slice().reverse().forEach(l=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${l.timestamp}</td><td>${l.materialType}</td><td>${l.truckId}</td><td>${(l.driver&&l.driver.name)||''}</td><td>${l.netWeight}</td><td>${l.location}</td>`;
    tbody.appendChild(tr);
  });
}

/* html5-qrcode scanner */
let scanner = null;
const lastEl = document.getElementById('last');
async function requestPermission(){
  try{
    // explicit getUserMedia with rear camera preference to trigger prompt
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    stream.getTracks().forEach(t=>t.stop());
    lastEl.textContent = 'Camera permission granted';
    await populateCameras();
  }catch(e){
    lastEl.textContent = 'Permission error: ' + (e && e.message || e);
  }
}

async function populateCameras(){
  try{
    const cams = await Html5Qrcode.getCameras();
    // no UI list here; we will pick the first rear camera if available
    return cams;
  }catch(e){
    console.warn('Camera list error', e);
    return [];
  }
}

async function startCamera(){
  if(scanner) return;
  scanner = new Html5Qrcode("reader");
  try{
    // prefer environment facing camera
    const constraints = { fps: 10, qrbox: { width: Math.min(window.innerWidth, 320), height: Math.min(window.innerWidth, 320) } };
    // Try to get a camera id that looks like rear camera
    const cams = await Html5Qrcode.getCameras();
    let camId = cams && cams.length ? cams[0].id : null;
    if(cams && cams.length>1){
      // pick camera with 'back' or 'rear' in label if present
      const rear = cams.find(c=>/(back|rear|environment)/i.test(c.label));
      if(rear) camId = rear.id;
    }
    await scanner.start(camId, constraints, decoded=>{
      try{
        const payload = JSON.parse(decoded);
        for(const k of REQUIRED) if(!(k in payload)) throw new Error('Missing '+k);
        const entry = { timestamp: nowIso(), materialType: payload.materialType, truckId: payload.truckId, driver: payload.driver||{}, netWeight: payload.netWeight, taeWeight: payload.taeWeight, materialWeight: payload.materialWeight, location: payload.location, raw: payload };
        addLog(entry);
        lastEl.textContent = JSON.stringify(entry, null, 2);
        if(navigator.vibrate) navigator.vibrate(120);
      }catch(err){
        lastEl.textContent = 'Invalid QR or parse error: ' + (err && err.message || err);
      }
    });
  }catch(e){
    lastEl.textContent = 'Start failed: ' + (e && e.message || e);
    scanner = null;
  }
}

async function stopCamera(){
  if(!scanner) return;
  try{ await scanner.stop(); scanner.clear(); scanner = null; lastEl.textContent = 'Camera stopped'; }catch(e){ lastEl.textContent = 'Stop error: '+(e&&e.message||e); scanner=null; }
}

/* File upload fallback */
document.getElementById('fileInput').addEventListener('change', async (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  const img = document.createElement('img');
  img.style.maxWidth = '100%';
  const url = URL.createObjectURL(f);
  img.src = url;
  // use html5-qrcode's scanFileV2 for static image
  try{
    const result = await Html5Qrcode.scanFileV2(f, { returnDetailedScanResult: false });
    // result is decoded text
    const decoded = result.decodedText || result;
    try{
      const payload = JSON.parse(decoded);
      for(const k of REQUIRED) if(!(k in payload)) throw new Error('Missing '+k);
      const entry = { timestamp: nowIso(), materialType: payload.materialType, truckId: payload.truckId, driver: payload.driver||{}, netWeight: payload.netWeight, taeWeight: payload.taeWeight, materialWeight: payload.materialWeight, location: payload.location, raw: payload };
      addLog(entry);
      lastEl.textContent = JSON.stringify(entry, null, 2);
    }catch(err){
      lastEl.textContent = 'Image decode parse error: ' + (err && err.message || err);
    }
  }catch(err){
    lastEl.textContent = 'Image scan failed: ' + (err && err.message || err);
  } finally { URL.revokeObjectURL(url); ev.target.value = ''; }
});

/* Save CSV actions */
document.getElementById('saveToday').addEventListener('click', ()=>{
  const logs = loadLogs();
  const today = new Date().toISOString().slice(0,10);
  const todays = logs.filter(l=>l.timestamp.startsWith(today));
  if(!todays.length){ alert('No logs for today'); return; }
  const csv = logsToCsv(todays);
  const filename = `delivery-log-${today}.csv`;
  downloadFile(filename, csv);
});

document.getElementById('exportAll').addEventListener('click', ()=>{
  const logs = loadLogs();
  if(!logs.length){ alert('No logs'); return; }
  const csv = logsToCsv(logs);
  const filename = `delivery-log-all-${new Date().toISOString().slice(0,10)}.csv`;
  downloadFile(filename, csv);
});

/* Buttons */
document.getElementById('requestBtn').addEventListener('click', requestPermission);
document.getElementById('startBtn').addEventListener('click', startCamera);
document.getElementById('stopBtn').addEventListener('click', stopCamera);

/* Online status */
function updateOnline(){ document.getElementById('online').textContent = navigator.onLine ? 'Online' : 'Offline'; }
window.addEventListener('online', updateOnline); window.addEventListener('offline', updateOnline); updateOnline();

/* Init */
render();
</script>
</body>
</html>
